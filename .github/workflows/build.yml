name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install flet
      # 加上 --yes 自动确认
      - run: flet build apk --yes
      
      # 关键调试步骤：列出 build 目录下所有文件，找到 APK 所在位置
      - name: Find APK
        run: ls -R build/

      - uses: actions/upload-artifact@v4
        with:
          name: app-apk
          # 将这里的路径修改为你日志里看到的实际路径
          path: build/apk/apk_build.apk
          if-no-files-found: error
